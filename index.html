科的创建，真的是艰难啊。&quot;,536871750]],[&quot;^16&quot;,[213,&quot;^P&quot;,&quot;^18&quot;,536871750]],[&quot;^16&quot;,[213,&quot;^F&quot;,212,536871750]],[&quot;^16&quot;,[213,&quot;^Y&quot;,43,536871750]],[&quot;^16&quot;,[213,&quot;^V&quot;,210,536871750]],[&quot;^16&quot;,[213,&quot;^U&quot;,43,536871750]],[&quot;^16&quot;,[213,&quot;^?&quot;,[&quot;^ &quot;],536871750]],[&quot;^16&quot;,[213,&quot;^19&quot;,true,536871750]],[&quot;^16&quot;,[213,&quot;^;&quot;,&quot;~u6281b840-2076-458d-a3c2-a0fd0339636f&quot;,536871750]],[&quot;^16&quot;,[214,&quot;^R&quot;,&quot;第十三章 美好生活&quot;,536871768]],[&quot;^16&quot;,[214,&quot;^P&quot;,&quot;^18&quot;,536871754]],[&quot;^16&quot;,[214,&quot;^F&quot;,210,536871755]],[&quot;^16&quot;,[214,&quot;^Y&quot;,43,536871754]],[&quot;^16&quot;,[214,&quot;^V&quot;,43,536871755]],[&quot;^16&quot;,[214,&quot;^U&quot;,43,536871768]],[&quot;^16&quot;,[214,&quot;^?&quot;,[&quot;^ &quot;],536871768]],[&quot;^16&quot;,[214,&quot;^19&quot;,true,536871754]],[&quot;^16&quot;,[214,&quot;^;&quot;,&quot;~u6281b850-465e-4e3c-b194-7cbf42b787ab&quot;,536871754]],[&quot;^16&quot;,[215,&quot;^R&quot;,&quot;这一章我很喜欢，是思想传记的最合适的写法。介绍一位当时的思想家或者诗人、文学家、批评家，然后介绍他与韦伯的交往，以及思想交流的情况，一方面介绍对方的情况，也介绍韦伯对其思想的评论，这样就很能够看出条理来。&quot;,536871775]],[&quot;^16&quot;,[215,&quot;^P&quot;,&quot;^18&quot;,536871769]],[&quot;^16&quot;,[215,&quot;^F&quot;,214,536871769]],[&quot;^16&quot;,[215,&quot;^Y&quot;,43,536871769]],[&quot;^16&quot;,[215,&quot;^V&quot;,214,536871772]],[&quot;^16&quot;,[215,&quot;^U&quot;,43,536871775]],[&quot;^16&quot;,[215,&quot;^?&quot;,[&quot;^ &quot;],536871775]],[&quot;^16&quot;,[215,&quot;^19&quot;,true,536871769]],[&quot;^16&quot;,[215,&quot;^;&quot;,&quot;~u6281b85d-df90-45d6-8d24-21fbb0e03819&quot;,536871769]],[&quot;^16&quot;,[216,&quot;^R&quot;,&quot;另外，我还查了一下格奥尔格的简介，1868年07月12日 至 1933年12月04日，德国20世纪初叶最重要的诗人之一。百度百科介绍中有一句：格奥尔格在政治上虽没有同德国法西斯同流合污，但法西斯的宣传机构仍然利用他的思想为第三帝国服务。&quot;,536871775]],[&quot;^16&quot;,[216,&quot;^P&quot;,&quot;^18&quot;,536871775]],[&quot;^16&quot;,[216,&quot;^F&quot;,215,536871775]],[&quot;^16&quot;,[216,&quot;^Y&quot;,43,536871775]],[&quot;^16&quot;,[216,&quot;^V&quot;,214,536871775]],[&quot;^16&quot;,[216,&quot;^U&quot;,43,536871775]],[&quot;^16&quot;,[216,&quot;^19&quot;,true,536871775]],[&quot;^16&quot;,[216,&quot;^;&quot;,&quot;~u98ca4c8b-17b9-496c-af38-ba1b69ed39bc&quot;,536871775]],[&quot;^16&quot;,[217,&quot;^R&quot;,&quot;对照书中描述，格奥尔格：“谈到战争对人类的英雄本色而言是一件幸事...谈到了世界日益增长的和平安宁造成我们的麻烦与麻痹，让我们连一只鸡都杀不了。”但是：“他也承认自己无力从事这一勇敢的行为。”这就使得我们感受了一种：鼓吹战争的诗人的文弱形象。&quot;,536871775]],[&quot;^16&quot;,[217,&quot;^P&quot;,&quot;^18&quot;,536871775]],[&quot;^16&quot;,[217,&quot;^F&quot;,216,536871775]],[&quot;^16&quot;,[217,&quot;^Y&quot;,43,536871775]],[&quot;^16&quot;,[217,&quot;^V&quot;,214,536871775]],[&quot;^16&quot;,[217,&quot;^U&quot;,43,536871775]],[&quot;^16&quot;,[217,&quot;^19&quot;,true,536871775]],[&quot;^16&quot;,[217,&quot;^;&quot;,&quot;~u9116be68-6364-4dc7-a8c7-46d7b76ba1c2&quot;,536871775]],[&quot;^16&quot;,[218,&quot;^R&quot;,&quot;第十四章 旅行散记&quot;,536871802]],[&quot;^16&quot;,[218,&quot;^P&quot;,&quot;^18&quot;,536871778]],[&quot;^16&quot;,[218,&quot;^F&quot;,214,536871781]],[&quot;^16&quot;,[218,&quot;^Y&quot;,43,536871778]],[&quot;^16&quot;,[218,&quot;^V&quot;,43,536871781]],[&quot;^16&quot;,[218,&quot;^U&quot;,43,536871802]],[&quot;^16&quot;,[218,&quot;^?&quot;,[&quot;^ &quot;],536871802]],[&quot;^16&quot;,[218,&quot;^19&quot;,true,536871778]],[&quot;^16&quot;,[218,&quot;^;&quot;,&quot;~u6281b86e-f62a-4a76-a422-a2c1b6dd0ced&quot;,536871778]],[&quot;^16&quot;,[219,&quot;^R&quot;,&quot;确实是散记，就是各种风景描写，看画展，看戏剧，听音乐剧，还有逛展览。作为夫妻两人的生活记录，当然是很好，也很丰富。但是作为人物传记，确实有点水了。&quot;,536871809]],[&quot;^16&quot;,[219,&quot;^P&quot;,&quot;^18&quot;,536871803]],[&quot;^16&quot;,[219,&quot;^F&quot;,218,536871803]],[&quot;^16&quot;,[219,&quot;^Y&quot;,43,536871803]],[&quot;^16&quot;,[219,&quot;^V&quot;,218,536871806]],[&quot;^16&quot;,[219,&quot;^U&quot;,43,536871809]],[&quot;^16&quot;,[219,&quot;^?&quot;,[&quot;^ &q quot;^R&quot;,&quot;韦伯当了一段时间的多家战时医院的管理者，忙得不亦乐乎，还从一个学者的视角出发，讨论战时医院的各种管理问题。我的收获是，当时的大多数德国人，出于积极的、主动的爱国热情，从各方面投入自己的支持。这是我没法想象，但可以理解的一面。&quot;,536871856]],[&quot;^16&quot;,[223,&quot;^P&quot;,&quot;^18&quot;,536871852]],[&quot;^16&quot;,[223,&quot;^F&quot;,222,536871852]],[&quot;^16&quot;,[223,&quot;^Y&quot;,43,536871852]],[&quot;^16&quot;,[223,&quot;^V&quot;,222,536871853]],[&quot;^16&quot;,[223,&quot;^U&quot;,43,536871856]],[&quot;^16&quot;,[223,&quot;^?&quot;,[&quot;^ &quot;],536871856]],[&quot;^16&quot;,[223,&quot;^19&quot;,true,536871852]],[&quot;^16&quot;,[223,&quot;^;&quot;,&quot;~u6281b8c8-e8c9-4d45-8d15-d08792d21415&quot;,536871852]],[&quot;^16&quot;,[224,&quot;^R&quot;,&quot;第十七章 革命前夜的政治家&quot;,536871872]],[&quot;^16&quot;,[224,&quot;^P&quot;,&quot;^18&quot;,536871857]],[&quot;^16&quot;,[224,&quot;^F&quot;,222,536871860]],[&quot;^16&quot;,[224,&quot;^Y&quot;,43,536871857]],[&quot;^16&quot;,[224,&quot;^V&quot;,43,536871860]],[&quot;^16&quot;,[224,&quot;^U&quot;,43,536871872]],[&quot;^16&quot;,[224,&quot;^?&quot;,[&quot;^ &quot;],536871872]],[&quot;^16&quot;,[224,&quot;^19&quot;,true,536871857]],[&quot;^16&quot;,[224,&quot;^;&quot;,&quot;~u6281b8d2-75f9-47a3-bc34-118bbe00dd05&quot;,536871857]],[&quot;^16&quot;,[225,&quot;^R&quot;,&quot;其实我很替韦伯感到悲哀。他明明只是一个学者，却希望能够尽力影响当下的政治。尤其是在第一次世界大战时的德国，绝大多数民众都处在狂热之中，区区一个清醒的学者，又能产生什么影响呢？虽然他写了很多信，他的妻子尽力摘录了很多看起来都很有道理的文字……&quot;,536871879]],[&quot;^16&quot;,[225,&quot;^P&quot;,&quot;^18&quot;,536871873]],[&quot;^16&quot;,[225,&quot;^F&quot;,224,536871873]],[&quot;^16&quot;,[225,&quot;^Y&quot;,43,536871873]],[&quot;^16&quot;,[225,&quot;^V&quot;,224,536871876]],[&quot;^16&quot;,[225,&quot;^U&quot;,43,536871879]],[&quot;^16&quot;,[225,&quot;^?&quot;,[&quot;^ &quot;],536871879]],[&quot;^16&quot;,[225,&quot;^19&quot;,true,536871873]],[&quot;^16&quot;,[225,&quot;^;&quot;,&quot;~u6281b8e4-ab9b-483c-bc61-0010d577df8d&quot;,536871873]],[&quot;^16&quot;,[226,&quot;^R&quot;,&quot;第十八章 间奏&quot;,536871893]],[&quot;^16&quot;,[226,&quot;^P&quot;,&quot;^18&quot;,536871880]],[&quot;^16&quot;,[226,&quot;^F&quot;,224,536871881]],[&quot;^16&quot;,[226,&quot;^Y&quot;,43,536871880]],[&quot;^16&quot;,[226,&quot;^V&quot;,43,536871881]],[&quot;^16&quot;,[226,&quot;^U&quot;,43,536871893]],[&quot;^16&quot;,[226,&quot;^?&quot;,[&quot;^ &quot;],536871893]],[&quot;^16&quot;,[226,&quot;^19&quot;,true,536871880]],[&quot;^16&quot;,[226,&quot;^;&quot;,&quot;~u6281b8f3-bba9-4eee-b1dc-b9a9d15af9d8&quot;,536871880]],[&quot;^16&quot;,[227,&quot;^R&quot;,&quot;韦伯不在军队当军医院的管理者，去了维也纳上了一个学期的课，虽然非常辛苦，但是应该也非常满足，因为来上他的课的人，越来越多，最大的课堂都挤满了人，靠墙站都站不下了。这大概才是一个学者最理想的状态吧。可惜，下一章一战结束，韦伯又要投身政治了。&quot;,536871900]],[&quot;^16&quot;,[227,&quot;^P&quot;,&quot;^18&quot;,536871894]],[&quot;^16&quot;,[227,&quot;^F&quot;,226,536871894]],[&quot;^16&quot;,[227,&quot;^Y&quot;,43,536871894]],[&quot;^16&quot;,[227,&quot;^V&quot;,226,536871897]],[&quot;^16&quot;,[227,&quot;^U&quot;,43,536871900]],[&quot;^16&quot;,[227,&quot;^?&quot;,[&quot;^ &quot;],536871900]],[&quot;^16&quot;,[227,&quot;^19&quot;,true,536871894]],[&quot;^16&quot;,[227,&quot;^;&quot;,&quot;~u6281b8fd-6bee-46fd-b365-078feb1ad9a8&quot;,536871894]],[&quot;^16&quot;,[228,&quot;^R&quot;,&quot;第十九章 革命后的政治家&quot;,536871916]],[&quot;^16&quot;,[228,&quot;^P&quot;,&quot;^18&quot;,536871901]],[&quot;^16&quot;,[228,&quot;^F&quot;,226,536871904]],[&quot;^16&quot;,[228,&quot;^Y&quot;,43,536871901]],[&quot;^16&quot;,[228,&quot;^V&quot;,43,536871904]],[&quot;^16&quot;,[228,&quot;^U&quot;,43,536871916]],[&quot;^16&quot;,[228,&quot;^?&quot;,[&quot;^ &quot;],536871916]],[&quot;^16&quot;,[228,&quot;^19&quot;,true,536871901]],[&quot;^16&quot;,[228,&quot;^;&quot;,&quot;~u6281b908-1345-43bd-9226-e2e5c1c92660&quot;,536871901]],[&quot;^16&quot;,[229,&quot;^R&quot;,&quot;德国战败后，国内各种纷争，韦伯参与了宪法的制定，也去参加了巴黎和会。不过，宪法的部分，作者没有提及魏玛宪法第48条，只是着重提到了少数党派的质询权。对于和谈的部分，其实谁去都没用，因为战败国就是没有办法。更何况当时的列强，一心想彻底干掉德国。不过，韦伯他们打算拒签合约，其实又能如何呢？&quot;,536871926]],[&quot;^16&quot;,[229,&quot;^P&quot;,&quot;^18&quot;,536871917]],[&quot;^16&quot;,[229,&qu
