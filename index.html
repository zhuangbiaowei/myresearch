，1868年07月12日 至 1933年12月04日，德国20世纪初叶最重要的诗人之一。百度百科介绍中有一句：格奥尔格在政治上虽没有同德国法西斯同流合污，但法西斯的宣传机构仍然利用他的思想为第三帝国服务。&quot;,536871775]],[&quot;^16&quot;,[216,&quot;^P&quot;,&quot;^18&quot;,536871775]],[&quot;^16&quot;,[216,&quot;^F&quot;,215,536871775]],[&quot;^16&quot;,[216,&quot;^Y&quot;,43,536871775]],[&quot;^16&quot;,[216,&quot;^V&quot;,214,536871775]],[&quot;^16&quot;,[216,&quot;^U&quot;,43,536871775]],[&quot;^16&quot;,[216,&quot;^19&quot;,true,536871775]],[&quot;^16&quot;,[216,&quot;^;&quot;,&quot;~u98ca4c8b-17b9-496c-af38-ba1b69ed39bc&quot;,536871775]],[&quot;^16&quot;,[217,&quot;^R&quot;,&quot;对照书中描述，格奥尔格：“谈到战争对人类的英雄本色而言是一件幸事...谈到了世界日益增长的和平安宁造成我们的麻烦与麻痹，让我们连一只鸡都杀不了。”但是：“他也承认自己无力从事这一勇敢的行为。”这就使得我们感受了一种：鼓吹战争的诗人的文弱形象。&quot;,536871775]],[&quot;^16&quot;,[217,&quot;^P&quot;,&quot;^18&quot;,536871775]],[&quot;^16&quot;,[217,&quot;^F&quot;,216,536871775]],[&quot;^16&quot;,[217,&quot;^Y&quot;,43,536871775]],[&quot;^16&quot;,[217,&quot;^V&quot;,214,536871775]],[&quot;^16&quot;,[217,&quot;^U&quot;,43,536871775]],[&quot;^16&quot;,[217,&quot;^19&quot;,true,536871775]],[&quot;^16&quot;,[217,&quot;^;&quot;,&quot;~u9116be68-6364-4dc7-a8c7-46d7b76ba1c2&quot;,536871775]],[&quot;^16&quot;,[218,&quot;^R&quot;,&quot;第十四章 旅行散记&quot;,536871802]],[&quot;^16&quot;,[218,&quot;^P&quot;,&quot;^18&quot;,536871778]],[&quot;^16&quot;,[218,&quot;^F&quot;,214,536871781]],[&quot;^16&quot;,[218,&quot;^Y&quot;,43,536871778]],[&quot;^16&quot;,[218,&quot;^V&quot;,43,536871781]],[&quot;^16&quot;,[218,&quot;^U&quot;,43,536871802]],[&quot;^16&quot;,[218,&quot;^?&quot;,[&quot;^ &quot;],536871802]],[&quot;^16&quot;,[218,&quot;^19&quot;,true,536871778]],[&quot;^16&quot;,[218,&quot;^;&quot;,&quot;~u6281b86e-f62a-4a76-a422-a2c1b6dd0ced&quot;,536871778]],[&quot;^16&quot;,[219,&quot;^R&quot;,&quot;确实是散记，就是各种风景描写，看画展，看戏剧，听音乐剧，还有逛展览。作为夫妻两人的生活记录，当然是很好，也很丰富。但是作为人物传记，确实有点水了。&quot;,536871809]],[&quot;^16&quot;,[219,&quot;^P&quot;,&quot;^18&quot;,536871803]],[&quot;^16&quot;,[219,&quot;^F&quot;,218,536871803]],[&quot;^16&quot;,
